name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_DB: agent_test
          POSTGRES_PASSWORD: agent
          POSTGRES_USER: agent
        options: >-
          --health-cmd "pg_isready -U agent -d agent_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7.4.2-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://agent:agent@127.0.0.1:5432/agent_test
      REDIS_URL: redis://127.0.0.1:6379
      TEST_DATABASE_URL: postgresql://agent:agent@127.0.0.1:5432/agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
