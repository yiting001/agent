<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="企业知识助手中文对话测试页面" />
    <title>企业知识助手 - 在线对话</title>
    <link rel="stylesheet" href="../skin/css/agent-foundation.css" />
    <link rel="stylesheet" href="../skin/css/agent-chat.css" />
    <link rel="stylesheet" href="../skin/css/agent-selector.css" />
    <link rel="stylesheet" href="../skin/css/agent-composer.css" />
    <link rel="stylesheet" href="../skin/css/agent-rich-content.css" />
    <link rel="stylesheet" href="../skin/css/agent-responsive.css" />
  </head>
  <body class="agent-chat-page" data-agent-id="">
    <!-- 页面图标全部内置，测试时无需联网加载第三方资源。 -->
    <svg
      class="chat-icon-sprite"
      aria-hidden="true"
      xmlns:xlink="http://www.w3.org/1999/xlink"
    >
      <symbol id="chat-icon-bot" viewBox="0 -1 24 24">
        <rect
          x="4"
          y="6"
          width="16"
          height="13"
          rx="4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        />
        <path
          d="M12 3v3M8.5 11h.01M15.5 11h.01M8 15h8"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-user" viewBox="0 0.5 24 24">
        <circle
          cx="12"
          cy="8"
          r="4"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        />
        <path
          d="M4.5 21a7.5 7.5 0 0 1 15 0"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-plus" viewBox="0 0 24 24">
        <path
          d="M12 5v14M5 12h14"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-message" viewBox="0 0.2 24 24">
        <path
          d="M5 19l-2 2 .8-4A8 8 0 1 1 7 19H5Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        />
      </symbol>
      <symbol id="chat-icon-trash" viewBox="0 0.5 24 24">
        <path
          d="M4 7h16M9 7V4h6v3M7 7l1 14h8l1-14M10 11v6M14 11v6"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </symbol>
      <symbol id="chat-icon-menu" viewBox="0 0 24 24">
        <path
          d="M4 7h16M4 12h16M4 17h16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-send" viewBox="0 0 24 24">
        <path
          d="m3 3 18 9-18 9 3-9-3-9Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        />
        <path
          d="M6 12h15"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        />
      </symbol>
      <symbol id="chat-icon-light" viewBox="0 0.2 24 24">
        <path
          d="M9 18h6M10 22h4M8.5 15.5A7 7 0 1 1 15.5 15.5c-.9.7-1.5 1.5-1.5 2.5h-4c0-1-.6-1.8-1.5-2.5Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-file" viewBox="0 0 24 24">
        <path
          d="M6 3h8l4 4v14H6V3Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        />
        <path
          d="M14 3v5h5M9 12h6M9 16h6"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-close" viewBox="0 0 24 24">
        <path
          d="M6 6l12 12M18 6 6 18"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-chart" viewBox="0 0 24 24">
        <path
          d="M4 4v16h16"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
        <path
          d="M8 16v-5M12 16V8M16 16v-3"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
      <symbol id="chat-icon-formula" viewBox="0 0 24 24">
        <path
          d="M15 4h-3.5a2 2 0 0 0-2 2.2L10.5 18a2 2 0 0 1-2 1.9H7M6.5 11H14"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
        <path
          d="M15.5 14l4 5M19.5 14l-4 5"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        />
      </symbol>
    </svg>

    <div class="chat-workspace">
      <aside class="chat-sidebar" data-chat-sidebar>
        <div class="chat-sidebar__brand">
          <a
            class="chat-brand"
            href="#"
            aria-label="灵枢智能体"
            data-brand-root
          >
            <span class="chat-brand__mark" data-brand-icon
              ><svg>
                <use
                  href="#chat-icon-bot"
                  xlink:href="#chat-icon-bot"
                ></use></svg
            ></span>
            <span data-brand-name>灵枢智能体</span>
          </a>
        </div>
        <button
          class="chat-button chat-new-button"
          data-chat-clear
          type="button"
        >
          <svg>
            <use href="#chat-icon-plus" xlink:href="#chat-icon-plus"></use>
          </svg>
          开始新对话
        </button>
        <p class="chat-sidebar__label">当前会话</p>
        <nav class="chat-history" aria-label="当前会话">
          <button
            class="chat-history__item is-active"
            data-chat-history
            type="button"
          >
            <span class="chat-history__icon"
              ><svg>
                <use
                  href="#chat-icon-message"
                  xlink:href="#chat-icon-message"
                ></use></svg
            ></span>
            <span class="chat-history__copy"
              ><strong>新对话</strong><span>本次访问</span></span
            >
          </button>
        </nav>
        <div class="chat-sidebar__footer">
          <p>随时开始新的对话，获取你需要的帮助。</p>
        </div>
      </aside>

      <button
        class="chat-sidebar-backdrop"
        data-chat-backdrop
        type="button"
        aria-label="关闭对话列表"
        aria-hidden="true"
      ></button>

      <main class="chat-main">
        <header class="chat-header">
          <button
            class="chat-icon-button chat-mobile-only"
            data-chat-sidebar-open
            type="button"
            aria-label="打开对话列表"
          >
            <svg>
              <use href="#chat-icon-menu" xlink:href="#chat-icon-menu"></use>
            </svg>
          </button>
          <div class="chat-header__identity">
            <span class="chat-agent-avatar">
              <svg>
                <use href="#chat-icon-bot" xlink:href="#chat-icon-bot"></use>
              </svg>
              <i class="chat-status-dot"></i>
            </span>
            <span class="chat-header__copy">
              <strong>企业知识助手</strong>
              <span>在线为你解答问题</span>
            </span>
          </div>
          <div class="chat-header__actions">
            <button
              class="chat-icon-button"
              data-chat-clear
              type="button"
              aria-label="清空当前对话"
              title="清空当前对话"
            >
              <svg>
                <use
                  href="#chat-icon-trash"
                  xlink:href="#chat-icon-trash"
                ></use>
              </svg>
            </button>
            <button
              class="chat-button chat-button--plain"
              data-chat-clear
              type="button"
            >
              重新开始
            </button>
          </div>
        </header>

        <section
          class="chat-conversation"
          data-chat-conversation
          aria-live="polite"
        >
          <div class="chat-conversation__inner">
            <div class="chat-welcome">
              <span class="chat-welcome__avatar"
                ><svg>
                  <use
                    href="#chat-icon-bot"
                    xlink:href="#chat-icon-bot"
                  ></use></svg
              ></span>
              <h1>你好，我是企业知识助手</h1>
              <p>你可以直接提出问题，我会尽力提供清晰、准确的回答。</p>
              <div class="chat-suggestions">
                <button
                  class="chat-suggestion"
                  data-quick-question="请介绍一下你可以提供哪些帮助？"
                  type="button"
                >
                  <span class="chat-suggestion__icon"
                    ><svg>
                      <use
                        href="#chat-icon-light"
                        xlink:href="#chat-icon-light"
                      ></use></svg
                  ></span>
                  <span class="chat-suggestion__copy"
                    ><strong>了解助手能力</strong
                    ><span>看看我可以帮助你完成什么</span></span
                  >
                </button>
                <button
                  class="chat-suggestion"
                  data-quick-question="请根据我的需求给出一份业务方案建议。"
                  type="button"
                >
                  <span class="chat-suggestion__icon"
                    ><svg>
                      <use
                        href="#chat-icon-file"
                        xlink:href="#chat-icon-file"
                      ></use></svg
                  ></span>
                  <span class="chat-suggestion__copy"
                    ><strong>获取方案建议</strong
                    ><span>说明场景后生成初步建议</span></span
                  >
                </button>
                <button
                  class="chat-suggestion"
                  data-quick-question="请用表格对比两种方案，并用仪表盘展示推荐度。"
                  type="button"
                >
                  <span class="chat-suggestion__icon"
                    ><svg>
                      <use
                        href="#chat-icon-chart"
                        xlink:href="#chat-icon-chart"
                      ></use></svg
                  ></span>
                  <span class="chat-suggestion__copy"
                    ><strong>表格与仪表盘</strong
                    ><span>用图表直观展示对比结果</span></span
                  >
                </button>
                <button
                  class="chat-suggestion"
                  data-quick-question="请用公式推导一个复利计算示例。"
                  type="button"
                >
                  <span class="chat-suggestion__icon"
                    ><svg>
                      <use
                        href="#chat-icon-formula"
                        xlink:href="#chat-icon-formula"
                      ></use></svg
                  ></span>
                  <span class="chat-suggestion__copy"
                    ><strong>公式推导</strong
                    ><span>数学公式与计算过程渲染</span></span
                  >
                </button>
              </div>
            </div>
            <div class="chat-message-list" data-chat-messages>
              <article class="chat-message">
                <span class="chat-message__avatar"
                  ><svg>
                    <use
                      href="#chat-icon-bot"
                      xlink:href="#chat-icon-bot"
                    ></use></svg
                ></span>
                <div class="chat-message__body">
                  <span class="chat-message__name">企业知识助手</span>
                  <div class="chat-message__bubble">
                    <p>
                      欢迎使用智能体对话页面。请告诉我你想了解的问题，我会马上为你解答。
                    </p>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <div class="chat-composer-wrap" role="group" aria-label="消息输入">
          <div class="chat-composer-shell">
            <div
              class="chat-pending-attachments"
              data-chat-pending-attachments
              hidden
            ></div>
            <p
              class="chat-attachment-error"
              data-chat-attachment-error
              role="alert"
              hidden
            ></p>
            <div class="chat-composer">
              <label
                class="chat-attachment-button"
                title="上传图片或音频"
                aria-label="上传图片或音频"
              >
                <svg>
                  <use
                    href="#chat-icon-file"
                    xlink:href="#chat-icon-file"
                  ></use>
                </svg>
                <input
                  data-chat-attachment-input
                  type="file"
                  accept="image/png,image/jpeg,image/webp,image/gif,audio/mpeg,audio/wav"
                  multiple
                />
              </label>
              <label class="chat-visually-hidden" for="agent-chat-input"
                >输入问题</label
              >
              <textarea
                id="agent-chat-input"
                data-chat-input
                rows="1"
                maxlength="8000"
                placeholder="输入问题，或上传图片/音频…"
              ></textarea>
              <button
                class="chat-send-button"
                data-chat-send
                type="button"
                aria-label="发送消息"
              >
                <svg>
                  <use
                    href="#chat-icon-send"
                    xlink:href="#chat-icon-send"
                  ></use>
                </svg>
              </button>
            </div>
          </div>
          <p class="chat-disclaimer">
            支持图片和音频输入；智能体生成的内容仅供参考，请核实重要信息。
          </p>
        </div>
      </main>
    </div>

    <script src="../skin/js/agent-site-layout.js"></script>
    <script src="../skin/js/agent-branding.js"></script>
    <script src="../skin/js/agent-selector.js"></script>
    <script src="../skin/js/agent-attachments.js"></script>
    <script src="../skin/js/agent-rich-content.js"></script>
    <script src="../skin/js/agent-platform.js"></script>
  </body>
</html>
